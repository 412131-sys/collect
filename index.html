<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端收藏庫 - 專業數位資產管理</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#F8F9FD] text-slate-700 flex flex-col h-screen overflow-hidden">

    <!-- 網域未授權警告橫幅 -->
    <div id="auth-error-banner" class="hidden bg-red-50 border-b border-red-200 text-red-600 px-6 py-3 text-sm flex items-center justify-center gap-2 shrink-0 z-50 shadow-sm">
        <i data-lucide="alert-triangle" class="w-4 h-4"></i>
        <span><strong>網域未授權：</strong> Firebase 拒絕了連線。請至 Firebase Console &gt; Authentication &gt; Settings &gt; Authorized domains，將目前的網址加入白名單中。</span>
    </div>

    <div id="app" class="flex flex-1 overflow-hidden">
        <!-- 側邊導覽欄 -->
        <aside class="w-64 bg-white border-r border-slate-100 flex flex-col shrink-0">
            <div class="p-6 flex items-center gap-3">
                <div class="w-10 h-10 bg-[#5B50E6] rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <i data-lucide="folder" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-800">雲端收藏庫</h1>
            </div>

            <div class="px-4 mt-4 flex-1 overflow-y-auto hide-scrollbar">
                <div class="flex items-center justify-between px-3 py-2 text-xs font-semibold text-slate-400 uppercase tracking-wider">
                    <span>分類項目</span>
                    <i data-lucide="settings-2" class="w-3.5 h-3.5 cursor-pointer hover:text-slate-600"></i>
                </div>
                <nav id="category-nav" class="mt-2 space-y-1">
                    <!-- 分類按鈕將由 JS 動態生成 -->
                </nav>
            </div>

            <!-- 使用者資訊 -->
            <div id="user-section" class="p-4 border-t border-slate-100">
                <!-- 登入狀態將由 JS 動態生成 -->
                <div class="flex items-center gap-3 p-2 bg-slate-50 rounded-xl">
                    <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-400">
                        <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-bold text-slate-500">正在初始化連線...</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主要內容區 -->
        <main class="flex-1 flex flex-col min-w-0">
            <header class="h-20 bg-white border-b border-slate-100 flex items-center justify-between px-8 gap-6 shrink-0">
                <div class="relative w-full max-w-xl">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4.5 h-4.5"></i>
                    <input
                        type="text"
                        id="search-input"
                        placeholder="搜尋資料庫中的收藏..."
                        class="w-full bg-[#F1F4F9] border-none rounded-xl py-2.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-[#5B50E6]/20 outline-none transition-all"
                    />
                </div>
                <button 
                    id="add-btn"
                    onclick="openModal()"
                    class="flex-shrink-0 flex items-center gap-2 bg-[#5B50E6] text-white px-5 py-2.5 rounded-xl font-medium shadow-lg shadow-indigo-100 hover:bg-[#4A40D0] transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <i data-lucide="plus" class="w-4.5 h-4.5"></i>
                    <span>新增收藏</span>
                </button>
            </header>

            <div class="flex-1 p-8 overflow-y-auto relative">
                <div class="mb-8 flex justify-between items-end">
                    <div>
                        <h2 id="current-category-title" class="text-2xl font-bold text-slate-800">全部</h2>
                        <p id="result-count" class="text-sm text-slate-400 mt-1">正在等待授權與資料載入...</p>
                    </div>
                </div>

                <!-- 內容顯示區 -->
                <div id="items-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
                    <!-- 收藏項目將由 JS 動態生成 -->
                </div>

                <!-- 空狀態提示 -->
                <div id="empty-state" class="w-full aspect-[16/9] max-h-[500px] bg-white rounded-[32px] border-2 border-dashed border-slate-100 flex flex-col items-center justify-center p-12 text-center">
                    <div class="w-20 h-20 bg-[#F1F4F9] rounded-full flex items-center justify-center mb-6">
                        <i id="empty-icon" data-lucide="folder" class="text-[#5B50E6]/30 w-8 h-8"></i>
                    </div>
                    <h3 id="empty-title" class="text-xl font-bold text-slate-800 mb-2">準備連線中</h3>
                    <p id="empty-desc" class="text-slate-400 max-w-xs mb-8">請等待系統建立安全連線...</p>
                    <button id="empty-btn" onclick="openModal()" class="bg-[#5B50E6] text-white px-8 py-3 rounded-xl font-bold shadow-xl shadow-indigo-100 hover:scale-105 transition-transform hidden">
                        立即寫入資料
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增彈窗 (Modal) -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[32px] p-8 shadow-2xl scale-95 opacity-0 transition-all duration-300" id="modal-content">
            <h3 class="text-2xl font-bold text-slate-800 mb-6">新增收藏項目</h3>
            <form id="add-item-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-600">收藏品名稱</label>
                    <input type="text" id="item-title" required class="w-full bg-slate-50 border-none rounded-xl p-3 outline-none focus:ring-2 focus:ring-[#5B50E6]/20" placeholder="例如：Rolex Submariner...">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-600">所屬分類</label>
                    <select id="item-category" class="w-full bg-slate-50 border-none rounded-xl p-3 outline-none focus:ring-2 focus:ring-[#5B50E6]/20 appearance-none cursor-pointer">
                        <!-- 選項由 JS 動態生成 -->
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-600">上傳圖片</label>
                    <div class="relative group">
                        <input type="file" id="item-image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                        <div id="image-preview-container" class="w-full h-32 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center group-hover:border-[#5B50E6]/30 transition-all overflow-hidden">
                            <i data-lucide="image" class="text-slate-300 mb-2 w-7 h-7"></i>
                            <span class="text-xs text-slate-400 font-medium">點擊上傳圖片</span>
                        </div>
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 font-bold text-slate-400 hover:text-slate-600">取消</button>
                    <button type="submit" class="flex-1 bg-[#5B50E6] text-white py-3 rounded-xl font-bold shadow-lg shadow-indigo-100 hover:bg-[#4A40D0] active:scale-95 transition-all">確認新增</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyDkCpOYvK9QTLhk23f9bRYYi94nhU-hOfg",
            authDomain: "collection-b098f.firebaseapp.com",
            projectId: "collection-b098f",
            storageBucket: "collection-b098f.firebasestorage.app",
            messagingSenderId: "432081588061",
            appId: "1:432081588061:web:eecb14c970dfbb6935e2b4"
        };

        // 初始化
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'collection-app-html';

        // 全域狀態
        let currentUser = null;
        let allItems = [];
        let currentTab = '全部';
        let base64Image = "";
        let domainErrorOccurred = false;

        const categories = [
            { id: 'all', name: '全部', icon: 'tag' },
            { id: 'camera', name: '攝影器材', icon: 'camera' },
            { id: 'watch', name: '腕錶', icon: 'watch' },
            { id: 'cards', name: '集換式卡牌', icon: 'credit-card' },
            { id: 'books', name: '珍稀書籍', icon: 'book' },
            { id: 'art', name: '藝術品', icon: 'palette' },
            { id: 'others', name: '其他', icon: 'tag' }
        ];

        // 顯示網域錯誤提示
        function handleDomainError() {
            domainErrorOccurred = true;
            document.getElementById('auth-error-banner').classList.remove('hidden');
            document.getElementById('add-btn').disabled = true;
            
            const userSection = document.getElementById('user-section');
            userSection.innerHTML = `
                <div class="flex items-center gap-3 p-2 bg-red-50 border border-red-100 rounded-xl text-red-600">
                    <i data-lucide="shield-alert" class="w-5 h-5"></i>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-bold truncate">無法登入</p>
                        <p class="text-[10px] truncate">網域未經授權</p>
                    </div>
                </div>
            `;
            
            document.getElementById('empty-title').innerText = "無法載入資料庫";
            document.getElementById('empty-desc').innerText = "因為目前的網址未加入 Firebase 的授權名單中，安全機制已阻擋連線。";
            document.getElementById('empty-icon').setAttribute('data-lucide', 'x-circle');
            document.getElementById('empty-btn').classList.add('hidden');
            document.getElementById('result-count').innerText = "連線失敗";
            
            lucide.createIcons();
        }

        // 初始化驗證流程
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (tokenErr) {
                        console.warn("Custom token failed, attempting anonymous login...");
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth initialization failed:", err);
                // 精準捕捉網域未授權錯誤
                if (err.code === 'auth/unauthorized-domain' || err.message.includes('unauthorized-domain')) {
                    handleDomainError();
                }
            }
        }

        // 初始化分類 UI
        function initCategoryUI() {
            const nav = document.getElementById('category-nav');
            const select = document.getElementById('item-category');
            
            nav.innerHTML = categories.map(cat => `
                <button onclick="window.setCategory('${cat.name}')" id="cat-btn-${cat.name}" class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl transition-all text-slate-500 hover:bg-slate-50 disabled:opacity-50">
                    <div class="flex items-center gap-3">
                        <i data-lucide="${cat.icon}" class="w-4.5 h-4.5"></i>
                        <span class="font-medium text-sm">${cat.name}</span>
                    </div>
                    <span id="count-${cat.name}" class="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-400">0</span>
                </button>
            `).join('');

            select.innerHTML = categories.filter(c => c.id !== 'all').map(cat => `
                <option value="${cat.name}">${cat.name}</option>
            `).join('');
            
            lucide.createIcons();
            updateActiveTabUI();
        }

        // 更新選中分類樣式
        function updateActiveTabUI() {
            categories.forEach(cat => {
                const btn = document.getElementById(`cat-btn-${cat.name}`);
                if (btn) {
                    if (cat.name === currentTab) {
                        btn.className = "w-full flex items-center justify-between px-3 py-2.5 rounded-xl transition-all bg-[#EEEDFF] text-[#5B50E6]";
                    } else {
                        btn.className = "w-full flex items-center justify-between px-3 py-2.5 rounded-xl transition-all text-slate-500 hover:bg-slate-50";
                    }
                }
            });
            document.getElementById('current-category-title').innerText = currentTab;
            if (!domainErrorOccurred) renderItems();
        }

        // 渲染收藏項目
        function renderItems() {
            if (domainErrorOccurred) return;

            const grid = document.getElementById('items-grid');
            const empty = document.getElementById('empty-state');
            const searchInput = document.getElementById('search-input');
            const search = searchInput ? searchInput.value.toLowerCase() : "";
            
            const filtered = allItems.filter(item => {
                const matchCat = currentTab === '全部' || item.category === currentTab;
                const matchSearch = item.title.toLowerCase().includes(search);
                return matchCat && matchSearch;
            });

            // 更新數量標籤
            categories.forEach(cat => {
                const countElem = document.getElementById(`count-${cat.name}`);
                if (countElem) {
                    const count = cat.name === '全部' ? allItems.length : allItems.filter(i => i.category === cat.name).length;
                    countElem.innerText = count;
                }
            });

            const resultCountElem = document.getElementById('result-count');
            if (resultCountElem) {
                resultCountElem.innerText = `顯示 ${filtered.length} 項結果`;
            }

            if (filtered.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                document.getElementById('empty-icon').setAttribute('data-lucide', 'folder');
                document.getElementById('empty-title').innerText = "這裡目前沒有任何收藏";
                document.getElementById('empty-desc').innerText = "目前的分類下沒有資料。點擊按鈕寫入第一筆收藏。";
                if(currentUser) document.getElementById('empty-btn').classList.remove('hidden');
                lucide.createIcons();
            } else {
                grid.classList.remove('hidden');
                empty.classList.add('hidden');
                grid.innerHTML = filtered.map(item => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50 group hover:shadow-md transition-all">
                        <div class="aspect-square bg-slate-100 rounded-xl mb-4 overflow-hidden relative">
                            ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover transition-transform group-hover:scale-105">` : `
                                <div class="w-full h-full flex items-center justify-center text-slate-300">
                                    <i data-lucide="image" class="w-10 h-10"></i>
                                </div>
                            `}
                            <div class="absolute top-2 right-2 bg-white/90 backdrop-blur-sm px-2 py-1 rounded-lg text-[10px] font-bold text-[#5B50E6] shadow-sm">
                                ${item.category}
                            </div>
                        </div>
                        <h4 class="font-bold text-slate-800 truncate">${item.title}</h4>
                        <p class="text-xs text-slate-400 mt-1">${item.createdAt ? new Date(item.createdAt.seconds * 1000).toLocaleDateString() : '剛剛'}</p>
                    </div>
                `).join('');
                lucide.createIcons();
            }
        }

        // Auth 狀態監聽 (不再在此處自動執行 signInAnonymously 避免無限迴圈)
        onAuthStateChanged(auth, (user) => {
            if (domainErrorOccurred) return; // 若確定網域錯誤，停止後續處理
            
            currentUser = user;
            if (user) {
                updateUserUI();
                startDataSync();
            } else {
                // 如果是被登出，顯示未登入狀態
                const userSection = document.getElementById('user-section');
                userSection.innerHTML = `
                    <div class="flex items-center gap-3 p-2 bg-slate-50 rounded-xl">
                        <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-400"><i data-lucide="user" class="w-4 h-4"></i></div>
                        <div class="flex-1 min-w-0">
                            <p class="text-xs font-bold truncate">尚未登入</p>
                            <p class="text-[10px] text-slate-400">點擊登入以同步</p>
                        </div>
                        <button onclick="window.login()" class="text-[#5B50E6] hover:scale-110 transition-transform"><i data-lucide="log-in" class="w-4 h-4"></i></button>
                    </div>
                `;
                lucide.createIcons();
                document.getElementById('empty-title').innerText = "請先登入帳號";
                document.getElementById('empty-desc').innerText = "需要身分驗證才能載入您的個人收藏庫。";
                document.getElementById('empty-btn').classList.add('hidden');
                document.getElementById('result-count').innerText = "未連線";
            }
        });

        function updateUserUI() {
            if (!currentUser) return;
            const userSection = document.getElementById('user-section');
            if (currentUser.isAnonymous) {
                userSection.innerHTML = `
                    <div class="flex flex-col gap-2">
                        <div class="flex items-center gap-3 p-2 bg-slate-50 rounded-xl">
                            <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-400"><i data-lucide="ghost" class="w-4 h-4"></i></div>
                            <div class="flex-1 min-w-0">
                                <p class="text-xs font-bold truncate">訪客模式</p>
                                <p class="text-[10px] text-slate-400">資料僅暫存</p>
                            </div>
                            <button onclick="window.login()" class="text-[#5B50E6] hover:scale-110 transition-transform" title="登入以永久保存"><i data-lucide="log-in" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `;
            } else {
                userSection.innerHTML = `
                    <div class="flex items-center gap-3 p-2 bg-slate-50 rounded-xl">
                        <img src="${currentUser.photoURL || 'https://via.placeholder.com/32'}" class="w-8 h-8 rounded-full border border-white shadow-sm">
                        <div class="flex-1 min-w-0">
                            <p class="text-xs font-bold truncate">${currentUser.displayName || '使用者'}</p>
                            <p class="text-[10px] text-slate-400 truncate">已連線至雲端</p>
                        </div>
                        <button onclick="window.logout()" class="text-slate-400 hover:text-red-500 transition-colors"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        // 資料同步
        let unsubscribeSync = null;
        function startDataSync() {
            if (unsubscribeSync) unsubscribeSync();
            const itemsCol = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'items');
            unsubscribeSync = onSnapshot(itemsCol, (snapshot) => {
                allItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderItems();
            }, (error) => {
                console.error("Firestore sync error:", error);
            });
        }

        // 圖片轉 Base64
        const imageInput = document.getElementById('item-image');
        if (imageInput) {
            imageInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 1024 * 1024) {
                        alert("檔案請小於 1MB");
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        base64Image = event.target.result;
                        const preview = document.getElementById('image-preview-container');
                        if (preview) {
                            preview.innerHTML = `<img src="${base64Image}" class="w-full h-full object-cover">`;
                        }
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        // 新增項目
        const addForm = document.getElementById('add-item-form');
        if (addForm) {
            addForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!currentUser) {
                    alert("請先登入後再新增收藏！");
                    return;
                }
                const title = document.getElementById('item-title').value;
                const category = document.getElementById('item-category').value;
                
                try {
                    const itemsCol = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'items');
                    await addDoc(itemsCol, {
                        title,
                        category,
                        image: base64Image,
                        createdAt: serverTimestamp()
                    });
                    closeModal();
                    e.target.reset();
                    base64Image = "";
                    document.getElementById('image-preview-container').innerHTML = `<i data-lucide="image" class="text-slate-300 mb-2 w-7 h-7"></i><span class="text-xs text-slate-400 font-medium">點擊上傳圖片</span>`;
                    lucide.createIcons();
                } catch (err) {
                    console.error("Save error:", err);
                    alert("儲存失敗，請確認網路狀態與權限。");
                }
            });
        }

        // 搜尋監聽
        const searchInput = document.getElementById('search-input');
        if (searchInput) {
            searchInput.addEventListener('input', renderItems);
        }

        // 暴露給 window 的函數
        window.login = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                if (err.code === 'auth/unauthorized-domain' || err.message.includes('unauthorized-domain')) {
                    handleDomainError();
                } else {
                    console.error("Login failed:", err);
                }
            }
        };
        
        window.logout = () => signOut(auth).then(() => window.location.reload());
        
        window.setCategory = (name) => {
            currentTab = name;
            updateActiveTabUI();
        };

        // 初始化啟動
        initCategoryUI();
        initAuth();

    </script>

    <script>
        // Modal 控制邏輯
        function openModal() {
            if(document.getElementById('add-btn').disabled) return;
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            modal.classList.replace('hidden', 'flex');
            setTimeout(() => {
                content.classList.replace('scale-95', 'scale-100');
                content.classList.replace('opacity-0', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            content.classList.replace('scale-100', 'scale-95');
            content.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => {
                modal.classList.replace('flex', 'hidden');
            }, 300);
        }
    </script>
</body>
</html>
